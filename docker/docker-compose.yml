# AeroPDF.dev — self-hosted runtime (PRD §19)
services:
  aeropdf:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aeropdf/engine:latest
    ports:
      - "8080:8080"
    environment:
      AEROPDF_API_KEY: local-dev-key
      STORAGE_DRIVER: local
      STORAGE_PATH: /data
      MAX_UPLOAD_MB: "50"
    volumes:
      - ./aeropdf-data:/data

